
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#191919;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:8px 10px;}
.wrap{width:100%;max-width:300px;margin:0 auto;}
.card{background:#1a1625;border:1px solid #3d2f70;border-radius:14px;padding:9px 12px 8px;overflow:hidden;}
.week-label{text-align:center;font-size:7px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#6b5a9e;margin-bottom:2px;}
.week-num{text-align:center;font-size:8px;color:#b39dff;margin-bottom:7px;letter-spacing:0.3px;}
.hg-wrap{display:flex;justify-content:center;margin-bottom:7px;}
.flip-section{display:flex;justify-content:center;align-items:flex-end;gap:3px;margin-bottom:7px;}
.flip-unit{display:flex;flex-direction:column;align-items:center;gap:2px;}
.flip-lbl{font-size:6px;letter-spacing:1.5px;text-transform:uppercase;color:#4a3a7a;font-weight:600;}
.flip-digits{display:flex;gap:2px;}
.sep{font-size:13px;font-weight:700;color:#f0c040;line-height:1;margin-bottom:8px;}
.btn-row{display:flex;justify-content:center;align-items:center;gap:5px;}
.btn{padding:5px 11px;border:none;border-radius:7px;font-size:7.5px;font-weight:700;letter-spacing:0.8px;cursor:pointer;transition:background 0.2s,transform 0.1s;text-transform:uppercase;}
.btn:active{transform:scale(0.97);}
.btn-start{background:#2a2060;color:#ffffff;}
.btn-start:hover{background:#3a2f80;}
.btn-start.locked{background:#1e1840;color:#ffffff;pointer-events:none;}
.btn-start.restart{background:#1a2a1a;color:#ffffff;border:1px solid #2a4a2a;}
.btn-start.restart:hover{background:#223022;}
.btn-stop{background:#2a0f0f;color:#ff4444;border:1px solid #4a1515;}
.btn-stop:hover{background:#350f0f;}
.btn-resume{background:#0f2a15;color:#44ff88;border:1px solid #155a25;}
.btn-resume:hover{background:#0f3518;}
.completion{display:none;text-align:center;padding:3px 0 5px;}
.comp-icon{font-size:15px;margin-bottom:2px;}
.comp-title{font-size:10px;font-weight:700;color:#f0c040;margin-bottom:2px;}
.comp-msg{font-size:7.5px;color:#9d88d4;line-height:1.55;margin-bottom:5px;white-space:pre-line;}
.watermark{font-size:6.5px;color:#ffffff44;letter-spacing:0.8px;margin-top:6px;padding-left:1px;}
</style>

<div class="wrap">
<div class="card">
  <div class="week-label">Content Creator Robot</div>
  <div class="week-num" id="weekNum">Week — · Start your week</div>
  <div class="hg-wrap">
    <canvas id="hgCanvas" width="82" height="108" style="display:block;"></canvas>
  </div>
  <div class="flip-section" id="flipSection">
    <div class="flip-unit">
      <div class="flip-digits">
        <canvas id="fd0" width="28" height="38"></canvas>
        <canvas id="fd1" width="28" height="38"></canvas>
      </div>
      <div class="flip-lbl">Days</div>
    </div>
    <div class="sep">:</div>
    <div class="flip-unit">
      <div class="flip-digits">
        <canvas id="fd2" width="28" height="38"></canvas>
        <canvas id="fd3" width="28" height="38"></canvas>
      </div>
      <div class="flip-lbl">Hours</div>
    </div>
    <div class="sep">:</div>
    <div class="flip-unit">
      <div class="flip-digits">
        <canvas id="fd4" width="28" height="38"></canvas>
        <canvas id="fd5" width="28" height="38"></canvas>
      </div>
      <div class="flip-lbl">Minutes</div>
    </div>
  </div>
  <div class="completion" id="completion">
    <div class="comp-icon" id="compIcon"></div>
    <div class="comp-title" id="compTitle"></div>
    <div class="comp-msg" id="compMsg"></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart" onclick="handleStart()">Start Week</button>
    <button class="btn btn-stop" id="btnStop" onclick="handleStop()" style="display:none;">Stop</button>
    <button class="btn btn-resume" id="btnResume" onclick="handleResume()" style="display:none;">Resume</button>
  </div>
  <div class="watermark">by Kaizen Studio</div>
</div>
</div>

<script>
const WEEK_MS=7*24*60*60*1000;
const COMPLETIONS=[
  {icon:'★',title:'Week crushed.',msg:'You showed up, you shipped, you grew.\nReset and go again — Week {n} awaits.'},
  {icon:'◆',title:'Another week, another level.',msg:'Creators who stay consistent win.\nYour audience is watching. Keep building.'},
  {icon:'▲',title:'Seven days. Done.',msg:'Progress compounds quietly.\nStart Week {n} stronger than you started this one.'},
  {icon:'●',title:'Week complete.',msg:'You stayed in the arena.\nOne more week in the books — begin again.'},
  {icon:'✦',title:'Week closed.',msg:'Discipline beats motivation every time.\nWeek {n} is your clean slate.'},
];

const SK='kz_weekly_timer_v6';
function saveState(){try{localStorage.setItem(SK,JSON.stringify({endTime,remaining,weekNum,running,stopped,completed}));}catch(e){}}
function loadState(){
  try{
    const d=JSON.parse(localStorage.getItem(SK));
    if(!d) return;
    weekNum=d.weekNum||0;completed=d.completed||false;stopped=d.stopped||false;running=false;
    if(d.running&&d.endTime){
      const left=d.endTime-Date.now();
      if(left>0){endTime=d.endTime;remaining=left;running=true;}
      else{completed=true;}
    } else if(d.stopped&&d.remaining>0){remaining=d.remaining;}
    else if(d.completed){completed=true;}
  }catch(e){}
}

const DW=28,DH=38,HALF=19,R=4;
const flipStates=Array.from({length:6},()=>({cur:'0',next:'0',progress:1,flipping:false}));

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawStatic(ctx,val){
  ctx.clearRect(0,0,DW,DH);
  rr(ctx,0,0,DW,HALF,R);ctx.fillStyle='#110a22';ctx.fill();
  rr(ctx,0,HALF,DW,HALF,R);ctx.fillStyle='#0d0818';ctx.fill();
  ctx.fillStyle='#0d0818';ctx.fillRect(0,HALF-1,DW,2);
  rr(ctx,0.5,0.5,DW-1,DH-1,R);ctx.strokeStyle='#3a2a6a';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,HALF);ctx.lineTo(DW,HALF);ctx.strokeStyle='#2a1a50';ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();rr(ctx,0,0,DW,DH,R);ctx.clip();
  ctx.font='bold 24px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.save();ctx.beginPath();ctx.rect(0,0,DW,HALF);ctx.clip();ctx.fillStyle='#c4b0ff';ctx.fillText(val,DW/2,DH/2+1);ctx.restore();
  ctx.save();ctx.beginPath();ctx.rect(0,HALF,DW,HALF);ctx.clip();ctx.fillStyle='#9078d4';ctx.fillText(val,DW/2,DH/2+1);ctx.restore();
  ctx.restore();
}

function drawFlipFrame(ctx,cur,next,progress){
  ctx.clearRect(0,0,DW,DH);
  const phase=progress<0.5?'top':'bot';
  const p=phase==='top'?progress*2:(progress-0.5)*2;
  ctx.save();rr(ctx,0,0,DW,DH,R);ctx.clip();
  rr(ctx,0,HALF,DW,HALF,R);ctx.fillStyle='#0d0818';ctx.fill();
  ctx.fillStyle='#0d0818';ctx.fillRect(0,HALF-1,DW,2);
  ctx.save();ctx.beginPath();ctx.rect(0,HALF,DW,HALF);ctx.clip();
  ctx.font='bold 24px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#9078d4';ctx.fillText(phase==='top'?cur:next,DW/2,DH/2+1);ctx.restore();
  rr(ctx,0,0,DW,HALF,R);ctx.fillStyle='#110a22';ctx.fill();
  ctx.save();ctx.beginPath();ctx.rect(0,0,DW,HALF);ctx.clip();
  ctx.font='bold 24px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#c4b0ff';ctx.fillText(next,DW/2,DH/2+1);ctx.restore();
  ctx.restore();
  ctx.save();rr(ctx,0,0,DW,DH,R);ctx.clip();
  if(phase==='top'){
    const sy=1-p;
    if(sy>0.001){
      ctx.save();ctx.beginPath();ctx.rect(0,0,DW,HALF);ctx.clip();
      ctx.translate(0,HALF);ctx.scale(1,sy);ctx.translate(0,-HALF);
      rr(ctx,0,0,DW,HALF,R);ctx.fillStyle='#110a22';ctx.fill();
      ctx.save();ctx.beginPath();ctx.rect(0,0,DW,HALF);ctx.clip();
      ctx.font='bold 24px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#c4b0ff';ctx.fillText(cur,DW/2,DH/2+1);ctx.restore();
      ctx.fillStyle='rgba(0,0,0,'+(p*0.45)+')';ctx.fillRect(0,0,DW,HALF);
      ctx.restore();
    }
  } else {
    const sy=p;
    if(sy>0.001){
      ctx.save();ctx.beginPath();ctx.rect(0,HALF,DW,HALF);ctx.clip();
      ctx.translate(0,HALF);ctx.scale(1,sy);
      rr(ctx,0,0,DW,HALF,R);ctx.fillStyle='#0d0818';ctx.fill();
      ctx.save();ctx.beginPath();ctx.rect(0,0,DW,HALF);ctx.clip();
      ctx.font='bold 24px "Courier New",monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillStyle='#9078d4';ctx.fillText(next,DW/2,DH/2+1);ctx.restore();
      ctx.fillStyle='rgba(255,255,255,'+(0.06*(1-p))+')';ctx.fillRect(0,0,DW,HALF);
      ctx.restore();
    }
  }
  ctx.restore();
  rr(ctx,0.5,0.5,DW-1,DH-1,R);ctx.strokeStyle='#3a2a6a';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,HALF);ctx.lineTo(DW,HALF);ctx.strokeStyle='#2a1a50';ctx.lineWidth=1.5;ctx.stroke();
}

const hgC=document.getElementById('hgCanvas');
const hgCtx=hgC.getContext('2d');
const HW=82,HH=108;
const topPts=[[10,8],[72,8],[48,54],[34,54]];
const botPts=[[34,60],[48,60],[72,102],[10,102]];
const neckX=32,neckY=52,neckW=18,neckH=8;
let sparks=[],sparksActive=false,hgPct=1;

function hgPath(ctx,pts){ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();}

function spawnSpark(){
  sparks.push({x:neckX+2+Math.random()*14,y:neckY+neckH,vx:(Math.random()-0.5)*0.5,vy:0.5+Math.random()*1.0,life:1,decay:0.022+Math.random()*0.02,r:0.6+Math.random()*1.0,hue:38+Math.random()*20});
}
function sandColor(pct){
  if(pct>0.65) return {r:240,g:192,b:64};
  if(pct>0.3) return {r:255,g:136,b:0};
  return {r:220,g:50,b:50};
}

function drawHourglass(){
  hgCtx.clearRect(0,0,HW,HH);
  hgCtx.fillStyle='#1e1440';hgCtx.strokeStyle='#4a3580';hgCtx.lineWidth=1;
  [[8,4,66,5],[8,102,66,5]].forEach(([x,y,w,h])=>{hgCtx.beginPath();hgCtx.roundRect(x,y,w,h,3);hgCtx.fill();hgCtx.stroke();});
  hgCtx.beginPath();
  hgCtx.moveTo(10,7);hgCtx.lineTo(3,7);hgCtx.lineTo(3,106);hgCtx.lineTo(10,106);
  hgCtx.moveTo(72,7);hgCtx.lineTo(79,7);hgCtx.lineTo(79,106);hgCtx.lineTo(72,106);
  hgCtx.strokeStyle='#3a2a60';hgCtx.lineWidth=1;hgCtx.stroke();
  const topH=46*hgPct,topYf=8+(46-topH);
  hgCtx.save();hgPath(hgCtx,topPts);hgCtx.clip();
  hgCtx.fillStyle='#7c4dff';hgCtx.fillRect(0,topYf,HW,topH+2);hgCtx.restore();
  hgCtx.save();hgPath(hgCtx,topPts);hgCtx.strokeStyle='#5a40a0';hgCtx.lineWidth=1.5;hgCtx.stroke();hgCtx.restore();
  const elapsed=1-hgPct,botH=42*elapsed,botY=102-botH;
  const sc=sandColor(hgPct);
  hgCtx.save();hgPath(hgCtx,botPts);hgCtx.clip();
  hgCtx.fillStyle=`rgb(${sc.r},${sc.g},${sc.b})`;hgCtx.fillRect(0,botY,HW,botH+2);hgCtx.restore();
  hgCtx.save();hgPath(hgCtx,botPts);hgCtx.strokeStyle='#5a40a0';hgCtx.lineWidth=1.5;hgCtx.stroke();hgCtx.restore();
  hgCtx.fillStyle='#0e0820';hgCtx.strokeStyle='#4a3580';hgCtx.lineWidth=1;
  hgCtx.beginPath();hgCtx.roundRect(neckX,neckY,neckW,neckH,3);hgCtx.fill();hgCtx.stroke();
  hgCtx.save();
  hgPath(hgCtx,botPts);
  hgCtx.rect(neckX,neckY,neckW,neckH+4);
  hgCtx.clip();
  if(sparksActive&&Math.random()<0.45) spawnSpark();
  sparks=sparks.filter(s=>s.life>0&&s.y<106);
  sparks.forEach(s=>{
    s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    hgCtx.save();hgCtx.globalAlpha=Math.max(0,s.life)*0.9;
    hgCtx.fillStyle=`hsl(${s.hue},100%,65%)`;hgCtx.shadowColor=`hsl(${s.hue},100%,72%)`;hgCtx.shadowBlur=3;
    hgCtx.beginPath();hgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);hgCtx.fill();hgCtx.restore();
  });
  if(!sparksActive) sparks=sparks.filter(s=>s.life>0);
  hgCtx.restore();
}

function renderFlips(){
  for(let i=0;i<6;i++){
    const s=flipStates[i];
    const ctx=document.getElementById('fd'+i).getContext('2d');
    if(s.flipping){
      s.progress=Math.min(1,s.progress+0.07);
      drawFlipFrame(ctx,s.cur,s.next,s.progress);
      if(s.progress>=1){s.flipping=false;s.cur=s.next;}
    } else drawStatic(ctx,s.cur);
  }
}

function loop(){drawHourglass();renderFlips();requestAnimationFrame(loop);}
loop();

function pad2(n){return String(Math.max(0,n)).padStart(2,'0');}
function setDigits(d,h,m){
  const v=[...pad2(d),...pad2(h),...pad2(m)];
  v.forEach((val,i)=>{const s=flipStates[i];if(val!==s.cur&&!s.flipping){s.next=val;s.progress=0;s.flipping=true;}});
}
function initDigits(d,h,m){
  const v=[...pad2(d),...pad2(h),...pad2(m)];
  v.forEach((val,i)=>{const s=flipStates[i];s.cur=val;s.next=val;s.flipping=false;s.progress=1;});
}

let running=false,stopped=false,completed=false,endTime=null,remaining=WEEK_MS,weekNum=0,ticker=null;

function tick(){
  if(!running) return;
  const left=Math.max(0,endTime-Date.now());
  hgPct=left/WEEK_MS;
  setDigits(Math.floor(left/86400000),Math.floor((left%86400000)/3600000),Math.floor((left%3600000)/60000));
  saveState();
  if(left<=0){clearInterval(ticker);running=false;completed=true;saveState();showCompletion();}
}

function showCompletion(){
  sparksActive=false;
  document.getElementById('flipSection').style.display='none';
  const c=document.getElementById('completion');c.style.display='block';
  const pick=COMPLETIONS[(weekNum-1)%COMPLETIONS.length];
  document.getElementById('compIcon').textContent=pick.icon;
  document.getElementById('compTitle').textContent=pick.title;
  document.getElementById('compMsg').textContent=pick.msg.replace('{n}',weekNum+1);
  const bs=document.getElementById('btnStart');
  bs.textContent='Start Week '+(weekNum+1);bs.className='btn btn-start restart';bs.style.color='#ffffff';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('btnResume').style.display='none';
  hgPct=0;initDigits(0,0,0);
}

function handleStart(){
  if(running) return;
  weekNum++;remaining=WEEK_MS;endTime=Date.now()+remaining;
  running=true;stopped=false;completed=false;hgPct=1;sparksActive=true;
  document.getElementById('completion').style.display='none';
  document.getElementById('flipSection').style.display='flex';
  document.getElementById('weekNum').textContent='Week '+weekNum;
  const bs=document.getElementById('btnStart');
  bs.textContent='Start Week';bs.className='btn btn-start locked';bs.style.color='#ffffff';
  document.getElementById('btnStop').style.display='inline-block';
  document.getElementById('btnResume').style.display='none';
  initDigits(7,0,0);
  clearInterval(ticker);ticker=setInterval(tick,1000);tick();saveState();
}

function handleStop(){
  if(!running) return;
  remaining=Math.max(0,endTime-Date.now());
  clearInterval(ticker);running=false;stopped=true;sparksActive=false;
  document.getElementById('weekNum').textContent='Week '+weekNum+' · Paused';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('btnResume').style.display='inline-block';
  saveState();
}

function handleResume(){
  if(running||!stopped) return;
  endTime=Date.now()+remaining;running=true;stopped=false;sparksActive=true;
  document.getElementById('weekNum').textContent='Week '+weekNum;
  document.getElementById('btnResume').style.display='none';
  document.getElementById('btnStop').style.display='inline-block';
  clearInterval(ticker);ticker=setInterval(tick,1000);tick();saveState();
}

function restoreUI(){
  if(completed){
    showCompletion();
  } else if(running){
    sparksActive=true;
    document.getElementById('flipSection').style.display='flex';
    document.getElementById('weekNum').textContent='Week '+weekNum;
    const bs=document.getElementById('btnStart');bs.textContent='Start Week';bs.className='btn btn-start locked';bs.style.color='#ffffff';
    document.getElementById('btnStop').style.display='inline-block';
    const left=Math.max(0,endTime-Date.now());
    hgPct=left/WEEK_MS;
    initDigits(Math.floor(left/86400000),Math.floor((left%86400000)/3600000),Math.floor((left%3600000)/60000));
    clearInterval(ticker);ticker=setInterval(tick,1000);tick();
  } else if(stopped){
    sparksActive=false;
    document.getElementById('flipSection').style.display='flex';
    document.getElementById('weekNum').textContent='Week '+weekNum+' · Paused';
    const bs=document.getElementById('btnStart');bs.textContent='Start Week';bs.className='btn btn-start locked';bs.style.color='#ffffff';
    document.getElementById('btnStop').style.display='none';
    document.getElementById('btnResume').style.display='inline-block';
    hgPct=remaining/WEEK_MS;
    initDigits(Math.floor(remaining/86400000),Math.floor((remaining%86400000)/3600000),Math.floor((remaining%3600000)/60000));
  } else {
    sparksActive=false;hgPct=1;initDigits(7,0,0);
  }
}

loadState();restoreUI();
</script>
